<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Staj Başvurusu | LoraLabs</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
            background: radial-gradient(ellipse at top right, #0a1a30 0%, var(--navy) 60%);
        }
        .staj-wrap {
            width: 100%;
            max-width: 860px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--slate);
            font-size: 0.88rem;
            margin-bottom: 2rem;
            transition: color 0.25s;
        }
        .back-link:hover { color: var(--blue); }
        .form-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 3rem;
            backdrop-filter: blur(16px);
        }
        .form-card .eyebrow { margin-bottom: 0.5rem; }
        .form-card h1 {
            font-size: clamp(1.6rem, 5vw, 2.2rem);
            margin-bottom: 0.6rem;
        }
        .form-card > p {
            color: var(--slate);
            margin-bottom: 2.5rem;
            font-size: 0.95rem;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
            margin-bottom: 1.25rem;
        }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--slate);
            margin-bottom: 0.5rem;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.9rem 1rem;
            background: rgba(255,255,255,0.04);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            color: var(--white);
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.25s, box-shadow 0.25s;
        }
        .form-group select option { background: #0f172a; }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.25);
        }
        .submit-btn {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            margin-top: 0.5rem;
        }
        @media (max-width: 600px) {
            .form-card { padding: 2rem 1.4rem; }
            .form-row { grid-template-columns: 1fr; gap: 0; }
        }
    </style>
</head>
<body>
    <div class="staj-wrap">
        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Anasayfaya Dön
        </a>
        <div class="form-card">
            <span class="eyebrow">Kariyer</span>
            <h1>Staj Başvurusu</h1>
            <p>LoraLabs Ar-Ge ekibine katılmak için bilgilerinizi paylaşın.</p>
            <form>
                <div class="form-row">
                    <div class="form-group">
                        <label>Ad Soyad</label>
                        <input type="text" placeholder="Adınız ve soyadınız" required>
                    </div>
                    <div class="form-group">
                        <label>E-posta</label>
                        <input type="email" placeholder="ornek@mail.com" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Üniversite</label>
                        <input type="text" placeholder="Okuduğunuz üniversite" required>
                    </div>
                    <div class="form-group">
                        <label>Bölüm</label>
                        <input type="text" placeholder="Okuduğunuz bölüm" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>İlgi Alanı</label>
                    <select required>
                        <option value="" disabled selected>Bir alan seçin</option>
                        <option>Yapay Zeka &amp; Derin Öğrenme</option>
                        <option>IoT &amp; LoRaWAN Sistemleri</option>
                        <option>Tıbbi Bilişim &amp; Görüntü İşleme</option>
                        <option>Gömülü Sistemler &amp; Robotik</option>
                        <option>Mobil / Web Geliştirme</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Neden LoraLabs?</label>
                    <textarea rows="5" placeholder="Hedeflerinizden ve neden bizimle çalışmak istediğinizden bahsedin..." required></textarea>
                </div>
                <button type="submit" class="btn btn-primary submit-btn">
                    Başvuruyu Gönder <i class="fas fa-paper-plane"></i>
                </button>
            </form>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
