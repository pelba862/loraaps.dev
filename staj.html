<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staj Başvurusu | LoraLabs</title>
    
    <!-- Icons & Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    
    <style>
        body {
            background: radial-gradient(circle at top right, #0a192f 0%, #020617 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 1rem;
        }
        .form-container {
            width: 100%;
            max-width: 900px;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <a href="index.html" class="btn btn-outline" style="margin-bottom: 3rem; padding: 0.8rem 1.5rem;">
            <i class="fas fa-arrow-left"></i> Anasayfaya Dön
        </a>
        
        <div class="glass-card form-card reveal active">
            <span class="section-tag">Kariyer</span>
            <h1 class="section-title" style="font-size: 2.8rem; margin-bottom: 1rem;">Staj Başvurusu</h1>
            <p style="color: var(--text-muted); margin-bottom: 4rem; font-size: 1.1rem;">
                LoraLabs Ar-Ge ekibine katılmak için bilgilerinizi bizimle paylaşın.
            </p>
            
            <form>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                    <div class="form-group">
                        <label>Ad Soyad</label>
                        <input type="text" placeholder="Adınız ve soyadınız" required>
                    </div>
                    <div class="form-group">
                        <label>E-posta Adresi</label>
                        <input type="email" placeholder="ornek@mail.com" required>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                    <div class="form-group">
                        <label>Üniversite</label>
                        <input type="text" placeholder="Okuduğunuz üniversite" required>
                    </div>
                    <div class="form-group">
                        <label>Bölüm</label>
                        <input type="text" placeholder="Okuduğunuz bölüm" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>İlgi Alanı</label>
                    <select required>
                        <option value="" disabled selected>Bir alan seçin</option>
                        <option value="ai">Yapay Zeka & Derin Öğrenme</option>
                        <option value="iot">IoT & LoRaWAN Sistemleri</option>
                        <option value="medical">Tıbbi Bilişim & Görüntü İşleme</option>
                        <option value="embedded">Gömülü Sistemler & Robotik</option>
                        <option value="mobile">Mobil Uygulama Geliştirme</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Neden Biz?</label>
                    <textarea rows="5" placeholder="Hedeflerinizden ve neden bizimle çalışmak istediğinizden bahsedin..." required></textarea>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; height: 60px; font-size: 1.1rem;">
                    Başvuruyu Gönder <i class="fas fa-paper-plane"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="main.js"></script>
</body>
</html>
